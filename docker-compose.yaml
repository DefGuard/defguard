services:
  core:
    image: ghcr.io/defguard/defguard:${IMAGE_TAG}
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DEFGUARD_DB_HOST: db
      DEFGUARD_DB_PORT: 5432
      DEFGUARD_DB_USER: defguard
      DEFGUARD_DB_PASSWORD: defguard
      DEFGUARD_DB_NAME: defguard
      RUST_BACKTRACE: 1
    ports:
      # REST API
      - "8000:8000"
      # Default Core GRPC port
      - "50055:50055"
    depends_on:
      - db

  gateway:
    image: ghcr.io/defguard/gateway:${IMAGE_TAG}
    ports:
      # WireGuard endpoint
      - "50051:50051/udp"
      # Default Gateway GRPC port
      - "50066:50066"
    cap_add:
      - NET_ADMIN

  edge:
    image: ghcr.io/defguard/defguard-proxy:${IMAGE_TAG}
    ports:
      # REST API
      - "8080:8080"
      # Default Edge GRPC port
      - "50051:50051"
    environment:
      DEFGUARD_PROXY_GRPC_PORT: 50051
      RUST_BACKTRACE: 1

  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: defguard
      POSTGRES_USER: defguard
      POSTGRES_PASSWORD: defguard
    volumes:
      - ./.volumes/db:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U defguard"]
      interval: 3s
      timeout: 5s
      retries: 5

