name: Continuous integration

on:
  push:
    branches:
      - main
      - dev
      - "release/**"
    paths-ignore:
      - "*.md"
      - "LICENSE"
  pull_request:
    branches:
      - main
      - dev
      - "release/**"
    paths-ignore:
      - "*.md"
      - "LICENSE"

jobs:
  lint:
    runs-on:
      - codebuild-defguard-core-runner-${{ github.run_id }}-${{ github.run_attempt }}
      - instance-size:large

    container: public.ecr.aws/docker/library/rust:1

    env:
      CARGO_TERM_COLOR: always
      SQLX_OFFLINE: true
      RUSTC_WRAPPER: sccache

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Export workspace-relative cache paths
        run: |
          echo "SCCACHE_DIR=$GITHUB_WORKSPACE/.sccache" >> $GITHUB_ENV
          echo "CARGO_HOME=$GITHUB_WORKSPACE/.cargo"    >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/.cargo/bin"           >> $GITHUB_PATH

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CARGO_HOME }}/registry/index
            ${{ env.CARGO_HOME }}/registry/cache
            ${{ env.CARGO_HOME }}/git/db
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-lint-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: sccache-lint-

      - name: Install and start sccache
        run: |
          SCCACHE_VERSION=v0.14.0
          curl -sSL "https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz -C /tmp
          mv "/tmp/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache" /usr/local/bin/sccache
          sccache --start-server

      - name: Scan code with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        env:
          TRIVY_SHOW_SUPPRESSED: 1
          TRIVY_IGNOREFILE: "./.trivyignore.yaml"
        with:
          scan-type: "fs"
          scan-ref: "."
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH,MEDIUM"
          scanners: "vuln"

      - name: Install protoc
        run: apt-get update && apt-get -y install protobuf-compiler

      - name: Check format
        run: |
          rustup component add rustfmt
          cargo fmt -- --check

      - name: Run clippy linter
        run: |
          rustup component add clippy
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: Run cargo deny
        run: cargo deny check

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

  build:
    runs-on:
      - codebuild-defguard-core-runner-${{ github.run_id }}-${{ github.run_attempt }}
      - instance-size:2xlarge

    container: public.ecr.aws/docker/library/rust:1

    env:
      CARGO_TERM_COLOR: always
      SQLX_OFFLINE: true
      RUSTC_WRAPPER: sccache

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Export workspace-relative cache paths
        run: |
          echo "SCCACHE_DIR=$GITHUB_WORKSPACE/.sccache" >> $GITHUB_ENV
          echo "CARGO_HOME=$GITHUB_WORKSPACE/.cargo"    >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/.cargo/bin"           >> $GITHUB_PATH

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.CARGO_HOME }}/registry/index
            ${{ env.CARGO_HOME }}/registry/cache
            ${{ env.CARGO_HOME }}/git/db
          key: cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: cargo-registry-

      - name: Cache sccache
        uses: actions/cache@v4
        with:
          path: ${{ env.SCCACHE_DIR }}
          key: sccache-build-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: sccache-build-

      - name: Install and start sccache
        run: |
          SCCACHE_VERSION=v0.14.0
          curl -sSL "https://github.com/mozilla/sccache/releases/download/${SCCACHE_VERSION}/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl.tar.gz" \
            | tar -xz -C /tmp
          mv "/tmp/sccache-${SCCACHE_VERSION}-x86_64-unknown-linux-musl/sccache" /usr/local/bin/sccache
          sccache --start-server

      - name: Install protoc
        run: apt-get update && apt-get -y install protobuf-compiler

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Build and archive tests
        run: |
          cargo nextest archive \
            --locked \
            --all-features \
            --archive-file nextest-archive.tar.zst \
            --config 'profile.test.debug=false' \
            --config 'profile.test.strip="debuginfo"'

      - name: Show sccache stats
        if: always()
        run: sccache --show-stats

      - name: Upload test archive
        uses: actions/upload-artifact@v4
        with:
          name: nextest-archive
          path: nextest-archive.tar.zst
          retention-days: 1

  test:
    needs: build

    runs-on:
      - codebuild-defguard-core-runner-${{ github.run_id }}-${{ github.run_attempt }}
      - instance-size:large

    container: public.ecr.aws/docker/library/rust:1

    strategy:
      fail-fast: false
      matrix:
        partition: [1, 2, 3, 4, 5, 6, 7, 8]

    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:17-alpine
        env:
          POSTGRES_DB: defguard
          POSTGRES_USER: defguard
          POSTGRES_PASSWORD: defguard
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        command: postgres -c max_connections=400

    env:
      CARGO_TERM_COLOR: always
      DEFGUARD_DB_HOST: postgres
      DEFGUARD_DB_PORT: 5432
      DEFGUARD_DB_NAME: defguard
      DEFGUARD_DB_USER: defguard
      DEFGUARD_DB_PASSWORD: defguard
      DATABASE_URL: "postgresql://defguard:defguard@postgres/defguard"
      SQLX_OFFLINE: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Download test archive
        uses: actions/download-artifact@v4
        with:
          name: nextest-archive

      - name: Install cargo-nextest
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-nextest

      - name: Run tests (shard ${{ matrix.partition }}/8)
        run: |
          cargo nextest run \
            --no-fail-fast \
            --archive-file nextest-archive.tar.zst \
            --partition hash:${{ matrix.partition }}/8

  cleanup:
    needs: test
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Delete test archive artifact
        uses: actions/github-script@v7
        with:
          script: |
            const artifacts = await github.rest.actions.listWorkflowRunArtifacts({
              owner: context.repo.owner,
              repo: context.repo.repo,
              run_id: context.runId,
            });
            const artifact = artifacts.data.artifacts.find(a => a.name === 'nextest-archive');
            if (artifact) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
            }
