name: Continuous integration

on:
  push:
    branches:
      - main
      - dev
      - "release/**"
    paths-ignore:
      - "*.md"
      - "LICENSE"
  pull_request:
    branches:
      - main
      - dev
      - "release/**"
    paths-ignore:
      - "*.md"
      - "LICENSE"

jobs:
  test:
    runs-on:
      - codebuild-defguard-core-runner-${{ github.run_id }}-${{ github.run_attempt }}

    container: public.ecr.aws/docker/library/rust:1

    services:
      postgres:
        image: public.ecr.aws/docker/library/postgres:17-alpine
        env:
          POSTGRES_DB: defguard
          POSTGRES_USER: defguard
          POSTGRES_PASSWORD: defguard
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      CARGO_TERM_COLOR: always
      DEFGUARD_DB_HOST: postgres
      DEFGUARD_DB_PORT: 5432
      DEFGUARD_DB_NAME: defguard
      DEFGUARD_DB_USER: defguard
      DEFGUARD_DB_PASSWORD: defguard
      DATABASE_URL: "postgresql://defguard:defguard@postgres/defguard"
      SQLX_OFFLINE: true
      # sccache
      SCCACHE_GHA_ENABLED: "true"
      RUSTC_WRAPPER: "sccache"

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Scan code with Trivy
        uses: aquasecurity/trivy-action@0.35.0
        env:
          TRIVY_SHOW_SUPPRESSED: 1
          TRIVY_IGNOREFILE: "./.trivyignore.yaml"
        with:
          scan-type: "fs"
          scan-ref: "."
          exit-code: "1"
          ignore-unfixed: true
          severity: "CRITICAL,HIGH,MEDIUM"
          scanners: "vuln"

      - name: Run sccache-cache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Install protoc
        run: apt-get update && apt-get -y install protobuf-compiler

      - name: Check format
        run: |
          rustup component add rustfmt
          cargo fmt -- --check

      - name: Run clippy linter
        run: |
          rustup component add clippy
          cargo clippy --all-targets --all-features -- -D warnings

      - name: Install cargo extensions
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny,cargo-nextest

      - name: Run cargo deny
        run: cargo deny check

      - name: Run tests
        run: cargo nextest run --locked --no-fail-fast
