name: E2E tests

on:
  workflow_call:
    inputs:
      image_tag:
        type: string
        required: false
        description: 'Docker image tag to use. Defaults to the branch name.'

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  test:
    runs-on:
      - codebuild-defguard-core-runner-${{ github.run_id }}-${{ github.run_attempt }}
        instance-size:medium
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5, 6, 7, 8]

    steps:
      - uses: actions/checkout@v6
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GitHub container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Export image tag
        run: |
          if [[ -n "${{ inputs.image_tag }}" ]]; then
            IMAGE_TAG="${{ inputs.image_tag }}"
          else
            # strip "refs/heads." to get just the branch name
            BRANCH=${GITHUB_REF#refs/heads/}
            if [[ "$BRANCH" == release/* ]]; then
              # replace '/' with '-' on release branches
              IMAGE_TAG=${BRANCH//\//-}
            else
              # main/dev branch
              IMAGE_TAG=$BRANCH
            fi
          fi
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV
          echo "E2E tests will run on IMAGE_TAG=$IMAGE_TAG"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version-file: "./e2e/.nvmrc"

      - name: Install pnpm
        id: pnpm-install
        uses: pnpm/action-setup@v4
        with:
          # FIXME: temporarily pinned because of https://github.com/pnpm/pnpm/pull/9959
          version: 10.17
          run_install: false

      - name: Get pnpm store directory
        id: pnpm-cache
        shell: bash
        run: |
          echo "STORE_PATH=$(pnpm store path)" >> $GITHUB_OUTPUT

      - uses: actions/cache@v5
        name: Setup pnpm cache
        with:
          path: ${{ steps.pnpm-cache.outputs.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Pull images
        run: docker compose --file './docker-compose.e2e.yaml' pull

      - name: Install E2E dependencies
        working-directory: ./e2e
        run: pnpm install --frozen-lockfile

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('e2e/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-playwright-

      - name: Install playwright chromium
        working-directory: ./e2e
        run: |
          if [[ "${{ steps.playwright-cache.outputs.cache-hit }}" == "true" ]]; then
            # Browsers are cached; only install missing system dependencies.
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi

      - name: run tests
        id: run-test
        working-directory: ./e2e
        env:
          DEFGUARD_LICENSE_KEY: ${{ secrets.DEFGUARD_LICENSE_KEY }}
        run: pnpm test --shard=${{ matrix.shard }}/8

      - name: Stop compose
        if: always()
        run: docker compose --file './docker-compose.e2e.yaml' down

      - uses: actions/upload-artifact@v7
        if: failure()
        with:
          name: playwright-report-shard-${{ matrix.shard }}
          path: |
            ./e2e/playwright-report
          retention-days: 7

  trigger-dev-deploy:
    needs: test
    if: false # temporarily disabled
    uses: ./.github/workflows/dev-deployment.yml
    secrets: inherit

  trigger-staging-deploy:
    needs: test
    if: false # temporarily disabled
    uses: ./.github/workflows/staging-deployment.yml
    secrets: inherit
